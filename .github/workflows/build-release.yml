name: Build and release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: build-and-release
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - script: package:win:us
            artifact: MarketEye-US
            releaseAppName: marketeye-us
          - script: package:win:to
            artifact: MarketEye-TSX
            releaseAppName: marketeye-tsx
          - script: package:win:micro:us
            artifact: MicroFTM
            releaseAppName: microftm-us
          - script: package:win:micro:to
            artifact: MicroFTM-TSX
            releaseAppName: microftm-tsx
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Install Node.js and npm
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate flavor icons
        run: npm run generate:icons

      - name: Verify API build secrets
        shell: pwsh
        env:
          MARKETEYE_API_KEY: ${{ secrets.MARKETEYE_API_KEY }}
          MARKETEYE_API_URL: ${{ secrets.MARKETEYE_API_URL }}
        run: |
          if (-not $env:MARKETEYE_API_URL) { throw "MARKETEYE_API_URL is missing" }
          if (-not $env:MARKETEYE_API_KEY) { throw "MARKETEYE_API_KEY is missing" }

      - name: Package Windows app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MARKETEYE_API_KEY: ${{ secrets.MARKETEYE_API_KEY }}
          MARKETEYE_API_URL: ${{ secrets.MARKETEYE_API_URL }}
        run: npm run ${{ matrix.script }}

      - name: Verify API config baked into bundle
        shell: pwsh
        run: |
          $mainJs = "release/app/dist/main/main.js"
          if (-not (Test-Path $mainJs)) { throw "$mainJs was not produced" }
          if (-not (Select-String -Path $mainJs -Pattern 'marketeye-api' -Quiet)) {
            throw "API URL was not baked into $mainJs"
          }

      - name: Collect update artifacts
        shell: pwsh
        env:
          RELEASE_APP_NAME: ${{ matrix.releaseAppName }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          $tag = $env:GITHUB_REF_NAME
          if (-not $tag) { throw "GITHUB_REF_NAME is missing" }
          npx ts-node ./.erb/scripts/collect-update-artifacts.ts `
            --release-app-name $env:RELEASE_APP_NAME `
            --tag $tag `
            --repo "${{ github.repository }}"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            release/build/*.exe
            release/build/*.blockmap
          if-no-files-found: error

      - name: Upload update feed artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-updates
          path: updates/${{ matrix.releaseAppName }}/latest.yml
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if [ -z "$tag" ] || [ "$tag" = "${GITHUB_REF}" ]; then
            tag="${{ github.ref_name }}"
          fi
          mkdir -p release-assets
          find artifacts -name '*.exe' -exec cp {} release-assets/ \;
          find artifacts -name '*.blockmap' -exec cp {} release-assets/ \;
          gh release create "$tag" release-assets/* \
            --title "$tag" \
            --generate-notes \
            --repo "${{ github.repository }}"

  deploy-updates:
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Download update feed artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Stage gh-pages update feeds
        run: |
          mkdir -p public/updates
          find artifacts -path '*/latest.yml' -exec cp {} public/updates/ \; 2>/dev/null || true
          for dir in artifacts/*-updates; do
            [ -d "$dir" ] || continue
            name="$(basename "$dir")"
            releaseAppName="${name%-updates}"
            case "$releaseAppName" in
              MarketEye-US) feedDir=marketeye-us ;;
              MarketEye-TSX) feedDir=marketeye-tsx ;;
              MicroFTM) feedDir=microftm-us ;;
              MicroFTM-TSX) feedDir=microftm-tsx ;;
              *) continue ;;
            esac
            mkdir -p "public/updates/${feedDir}"
            cp "$dir/latest.yml" "public/updates/${feedDir}/latest.yml"
          done
          find public/updates -name latest.yml | sort

      - name: Deploy update feeds to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: 'deploy update feeds for ${{ github.ref_name }}'
